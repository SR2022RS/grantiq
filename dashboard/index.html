<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrantIQ — Grant Operations Portal</title>
<style>
:root{--bg:#06060b;--surface:#0d0d15;--surface2:#14141f;--surface3:#1c1c2a;--border:#252538;--text:#e8e8f0;--text2:#7878a0;--text3:#50506a;--accent:#7c5cff;--accent2:#9b7fff;--accent-bg:rgba(124,92,255,0.08);--green:#22c55e;--green-bg:rgba(34,197,94,0.1);--yellow:#f59e0b;--yellow-bg:rgba(245,158,11,0.1);--red:#ef4444;--red-bg:rgba(239,68,68,0.1);--blue:#3b82f6;--blue-bg:rgba(59,130,246,0.1);--radius:10px;--shadow:0 2px 12px rgba(0,0,0,0.3)}
@media(prefers-color-scheme:light){:root{--bg:#f4f4f8;--surface:#fff;--surface2:#f0f0f5;--surface3:#e8e8f0;--border:#dddde5;--text:#1a1a2e;--text2:#6b6b80;--text3:#9999a8;--shadow:0 2px 12px rgba(0,0,0,0.08)}}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.layout{display:flex;min-height:100vh}

/* Sidebar */
.sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);padding:16px 0;flex-shrink:0;display:flex;flex-direction:column}
.logo{padding:0 16px;margin-bottom:20px}
.logo h1{font-size:18px;color:var(--accent2);letter-spacing:-0.5px}
.logo p{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);margin-top:2px}
.nav-group{margin-bottom:12px;padding:0 8px}
.nav-label{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);padding:0 8px;margin-bottom:4px}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;cursor:pointer;font-size:12.5px;color:var(--text2);transition:all .12s;user-select:none}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--accent-bg);color:var(--accent2);font-weight:600}
.nav-item .badge{margin-left:auto;background:var(--red);color:#fff;font-size:9px;padding:1px 6px;border-radius:10px;font-weight:700}
.sidebar-footer{margin-top:auto;padding:12px 16px;border-top:1px solid var(--border)}
.sidebar-footer .status{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text3)}
.sidebar-footer .dot{width:6px;height:6px;border-radius:50%;background:var(--green)}

/* Main */
.main{flex:1;padding:20px 24px;overflow-y:auto;max-height:100vh}
.page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.page-header h2{font-size:18px;font-weight:700}
.org-switcher{display:flex;gap:4px}
.org-btn{padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-size:11px;transition:all .12s}
.org-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px}
.stat .label{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--text3)}
.stat .val{font-size:24px;font-weight:700;margin-top:4px}
.stat .sub{font-size:11px;color:var(--text2);margin-top:2px}

/* Cards & Tables */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:16px;box-shadow:var(--shadow)}
.card-header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border)}
.card-header h3{font-size:14px;font-weight:600}
.card-body{padding:0}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:8px 14px;font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);border-bottom:1px solid var(--border);background:var(--surface2)}
td{padding:10px 14px;border-bottom:1px solid var(--border);font-size:12.5px}
tr:last-child td{border-bottom:none}
tr:hover{background:var(--surface2)}
tr.clickable{cursor:pointer}

/* Score */
.score{display:inline-flex;align-items:center;gap:6px;font-weight:700;font-size:12px}
.score .bar{width:50px;height:5px;border-radius:3px;background:var(--surface3);overflow:hidden}
.score .fill{height:100%;border-radius:3px}
.score.high .fill{background:var(--green)}.score.mid .fill{background:var(--yellow)}.score.low .fill{background:var(--red)}

/* Status pills */
.pill{display:inline-block;padding:2px 8px;border-radius:12px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.pill-new{background:var(--blue-bg);color:var(--blue)}
.pill-ready{background:var(--green-bg);color:var(--green)}
.pill-missing{background:var(--red-bg);color:var(--red)}
.pill-uploaded{background:var(--green-bg);color:var(--green)}
.pill-preparing{background:var(--yellow-bg);color:var(--yellow)}
.pill-submitted{background:var(--accent-bg);color:var(--accent2)}

/* Document vault */
.doc-row{display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:1px solid var(--border)}
.doc-row:last-child{border-bottom:none}
.doc-row:hover{background:var(--surface2)}
.doc-icon{width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.doc-icon.missing{background:var(--red-bg)}.doc-icon.uploaded{background:var(--green-bg)}
.doc-info{flex:1;min-width:0}
.doc-info .name{font-size:12.5px;font-weight:500}
.doc-info .desc{font-size:11px;color:var(--text2);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.doc-actions{flex-shrink:0}
.upload-btn{padding:5px 14px;border-radius:6px;border:1px solid var(--accent);background:transparent;color:var(--accent2);cursor:pointer;font-size:11px;font-weight:500;transition:all .12s}
.upload-btn:hover{background:var(--accent);color:#fff}
.check-icon{color:var(--green);font-size:16px;font-weight:700}

/* Readiness gauge */
.gauge{width:100%;height:8px;border-radius:4px;background:var(--surface3);overflow:hidden;margin-top:8px}
.gauge .fill{height:100%;border-radius:4px;transition:width .5s}

/* Expanded detail */
.detail-panel{display:none;padding:16px;background:var(--surface2);border-top:1px solid var(--border)}
.detail-panel.show{display:block}
.detail-panel pre{white-space:pre-wrap;font-family:inherit;line-height:1.7;font-size:12.5px;color:var(--text2)}
.copy-btn{margin-top:8px;padding:5px 14px;border-radius:6px;border:none;background:var(--accent);color:#fff;cursor:pointer;font-size:11px}

/* Buttons */
.btn{padding:7px 16px;border-radius:7px;border:none;cursor:pointer;font-size:12px;font-weight:500;transition:all .12s}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent2)}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}.btn-secondary:hover{background:var(--surface3)}
.btn-sm{padding:4px 10px;font-size:11px}

/* Hidden file input */
.file-input{display:none}

/* Loading */
.loading{text-align:center;padding:40px;color:var(--text3)}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .5s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Responsive */
@media(max-width:900px){.sidebar{display:none}.stats{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="layout">
<div class="sidebar">
  <div class="logo"><h1>GrantIQ</h1><p>Grant Operations Portal</p></div>
  <div class="nav-group">
    <div class="nav-label">Dashboard</div>
    <div class="nav-item active" data-page="overview">📊 Overview</div>
    <div class="nav-item" data-page="grants">🔍 Grant Discovery</div>
  </div>
  <div class="nav-group">
    <div class="nav-label">Applications</div>
    <div class="nav-item" data-page="vault">📁 Document Vault <span class="badge" id="missing-badge">0</span></div>
    <div class="nav-item" data-page="packages">📦 Application Packages</div>
    <div class="nav-item" data-page="budgets">💰 Budget Templates</div>
  </div>
  <div class="nav-group">
    <div class="nav-label">Intelligence</div>
    <div class="nav-item" data-page="readiness">🎯 Grant Readiness</div>
    <div class="nav-item" data-page="history">📈 Run History</div>
  </div>
  <div class="sidebar-footer">
    <div class="status"><span class="dot" id="api-dot"></span> <span id="api-label">Connecting...</span></div>
  </div>
</div>

<div class="main" id="main">
  <div class="loading"><div class="spinner"></div><p style="margin-top:10px">Loading portal...</p></div>
</div>
</div>

<input type="file" id="fileInput" class="file-input" accept=".pdf,.doc,.docx,.png,.jpg,.jpeg">

<script>
const API = 'https://grantiq-bot-production.up.railway.app';
const SB_URL = 'https://zamokpkpneedvluthsem.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InphbW9rcGtwbmVlZHZsdXRoc2VtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1ODM2OTEsImV4cCI6MjA5MTE1OTY5MX0.dLRU-LFZe_1q5383OVYMjpVX2bhbHHwco90kzY8MqI4';

let D = {grants:[],drafts:[],runs:[],alerts:[],orgs:[],vault:[],packages:[],budgets:[]};
let page = 'overview', orgFilter = 'all';

// ── DATA ──
async function sbGet(table, params=''){
  const r=await fetch(`${SB_URL}/rest/v1/${table}?${params}`,{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});
  return await r.json();
}
async function sbPatch(table,filter,body){
  return fetch(`${SB_URL}/rest/v1/${table}?${filter}`,{method:'PATCH',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'},body:JSON.stringify(body)});
}

async function load(){
  try{
    const [apiData,vault,packages,budgets]=await Promise.all([
      fetch(`${API}/api/data`).then(r=>r.json()).catch(()=>({grants:[],drafts:[],runs:[],alerts:[],orgs:[]})),
      sbGet('document_vault','order=doc_type'),
      sbGet('application_packages','order=created_at.desc'),
      sbGet('budget_templates','order=created_at.desc'),
    ]);
    D={...apiData, vault:Array.isArray(vault)?vault:[], packages:Array.isArray(packages)?packages:[], budgets:Array.isArray(budgets)?budgets:[]};
    document.getElementById('api-dot').style.background='var(--green)';
    document.getElementById('api-label').textContent='Connected';
    const missing=(D.vault||[]).filter(v=>v.status==='missing').length;
    document.getElementById('missing-badge').textContent=missing;
    render();
  }catch(e){
    document.getElementById('api-dot').style.background='var(--red)';
    document.getElementById('api-label').textContent='Offline';
    document.getElementById('main').innerHTML='<div class="loading">Cannot connect to GrantIQ API</div>';
  }
}

function fg(){return orgFilter==='all'?D.grants:(D.grants||[]).filter(g=>g.org_id===orgFilter)}
function fv(){return orgFilter==='all'?D.vault:(D.vault||[]).filter(v=>v.org_id===orgFilter)}
function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):'';}
function orgName(id){return{holigenix_healthcare:'Holigenix Healthcare',k1_management:'K1 Management',owner_nonprofit:'Owner Nonprofit'}[id]||id||''}
function scoreCls(s){return s>=80?'high':s>=60?'mid':'low'}
function pillCls(s){return{new:'pill-new',ready:'pill-ready',missing:'pill-missing',uploaded:'pill-uploaded',preparing:'pill-preparing',submitted:'pill-submitted',draft:'pill-new',review:'pill-preparing',awarded:'pill-ready',expired:'pill-missing',needs_update:'pill-preparing'}[s]||'pill-new'}

// ── RENDER ──
function render(){
  const m=document.getElementById('main');
  const ph=`<div class="page-header"><h2>${{overview:'Overview',grants:'Grant Discovery',vault:'Document Vault',packages:'Application Packages',budgets:'Budget Templates',readiness:'Grant Readiness',history:'Run History'}[page]}</h2><div class="org-switcher"><button class="org-btn ${orgFilter==='all'?'active':''}" onclick="setOrg('all')">All</button><button class="org-btn ${orgFilter==='holigenix_healthcare'?'active':''}" onclick="setOrg('holigenix_healthcare')">Holigenix</button><button class="org-btn ${orgFilter==='k1_management'?'active':''}" onclick="setOrg('k1_management')">K1 Mgmt</button></div></div>`;
  m.innerHTML=ph+({overview:rOverview,grants:rGrants,vault:rVault,packages:rPackages,budgets:rBudgets,readiness:rReadiness,history:rHistory}[page]||rOverview)();
}

function rOverview(){
  const grants=fg(),vault=fv();
  const totalGrants=grants.length;
  const bestScore=grants.length?Math.max(...grants.map(g=>g.match_score||0)):0;
  const uploaded=vault.filter(v=>v.status==='uploaded').length;
  const totalDocs=vault.length;
  const readiness=totalDocs?Math.round(uploaded/totalDocs*100):0;
  const pkgs=(D.packages||[]).filter(p=>orgFilter==='all'||p.org_id===orgFilter);

  return `<div class="stats">
    <div class="stat"><div class="label">Grants Found</div><div class="val">${totalGrants}</div><div class="sub">across all searches</div></div>
    <div class="stat"><div class="label">Best Match</div><div class="val">${bestScore}%</div><div class="sub">highest score</div></div>
    <div class="stat"><div class="label">Docs Ready</div><div class="val">${uploaded}/${totalDocs}</div><div class="sub"><div class="gauge"><div class="fill" style="width:${readiness}%;background:${readiness>70?'var(--green)':readiness>40?'var(--yellow)':'var(--red)'}"></div></div></div></div>
    <div class="stat"><div class="label">Readiness</div><div class="val" style="color:${readiness>70?'var(--green)':readiness>40?'var(--yellow)':'var(--red)'}">${readiness}%</div><div class="sub">grant ready</div></div>
    <div class="stat"><div class="label">Packages</div><div class="val">${pkgs.length}</div><div class="sub">applications</div></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
    <div class="card"><div class="card-header"><h3>Top Grants</h3><button class="btn btn-sm btn-primary" onclick="setPage('grants')">View All</button></div><div class="card-body"><table><thead><tr><th>Grant</th><th>Org</th><th>Match</th></tr></thead><tbody>
      ${grants.sort((a,b)=>(b.match_score||0)-(a.match_score||0)).slice(0,5).map(g=>`<tr><td><strong>${esc(g.name)}</strong><br><span style="color:var(--text3);font-size:11px">${esc(g.funder||'')}</span></td><td style="font-size:11px">${orgName(g.org_id)}</td><td><span class="score ${scoreCls(g.match_score)}"><span class="bar"><span class="fill" style="width:${g.match_score||0}%"></span></span>${g.match_score||0}%</span></td></tr>`).join('')}
    </tbody></table></div></div>
    <div class="card"><div class="card-header"><h3>Missing Documents</h3><button class="btn btn-sm btn-primary" onclick="setPage('vault')">Upload</button></div><div class="card-body">
      ${vault.filter(v=>v.status==='missing').slice(0,5).map(v=>`<div class="doc-row"><div class="doc-icon missing">📄</div><div class="doc-info"><div class="name">${esc(v.doc_name)}</div><div class="desc">${esc(v.description)}</div></div><div class="doc-actions"><button class="upload-btn" onclick="uploadDoc('${v.id}','${esc(v.org_id)}','${esc(v.doc_type)}')">Upload</button></div></div>`).join('')||'<div style="padding:20px;text-align:center;color:var(--text3)">All documents uploaded!</div>'}
    </div></div>
  </div>`;
}

function rGrants(){
  const grants=fg().sort((a,b)=>(b.match_score||0)-(a.match_score||0));
  return `<div class="card"><div class="card-header"><h3>Grant Opportunities (${grants.length})</h3><button class="btn btn-sm btn-primary" onclick="runSearch()">🔍 Search New</button></div><div class="card-body"><table><thead><tr><th>Grant</th><th>Org</th><th>Amount</th><th>Deadline</th><th>Match</th><th>Status</th><th></th></tr></thead><tbody>
    ${grants.map((g,i)=>`<tr class="clickable" onclick="toggleDetail('g${i}')"><td><strong>${esc(g.name)}</strong><br><span style="color:var(--text3);font-size:11px">${esc(g.funder||'')}</span></td><td style="font-size:11px">${orgName(g.org_id)}</td><td>${esc(g.amount||'Varies')}</td><td>${g.deadline?new Date(g.deadline).toLocaleDateString():'Rolling'}</td><td><span class="score ${scoreCls(g.match_score)}"><span class="bar"><span class="fill" style="width:${g.match_score||0}%"></span></span>${g.match_score||0}%</span></td><td><span class="pill ${pillCls(g.status)}">${g.status||'new'}</span></td><td><button class="btn btn-sm btn-primary" onclick="event.stopPropagation();applyGrant('${esc(g.name)}','${esc(g.org_id)}')">Apply</button></td></tr><tr><td colspan="7"><div class="detail-panel" id="g${i}"><pre>${esc(g.description||'No details.')}\n\nCertification Advantage: ${esc(g.certification_advantage||'N/A')}\nEligibility: ${(g.eligibility||[]).map(e=>esc(e)).join(', ')||'N/A'}${g.url?'\nURL: '+esc(g.url):''}</pre></div></td></tr>`).join('')}
  </tbody></table></div></div>`;
}

function rVault(){
  const vault=fv();
  const uploaded=vault.filter(v=>v.status==='uploaded').length;
  const total=vault.length;
  const pct=total?Math.round(uploaded/total*100):0;
  const groups={all:'All Required',federal:'Federal Grants',state:'State Grants',foundation:'Foundation Grants',healthcare:'Healthcare'};
  return `<div class="stats" style="grid-template-columns:repeat(4,1fr)">
    <div class="stat"><div class="label">Total Required</div><div class="val">${total}</div></div>
    <div class="stat"><div class="label">Uploaded</div><div class="val" style="color:var(--green)">${uploaded}</div></div>
    <div class="stat"><div class="label">Missing</div><div class="val" style="color:var(--red)">${total-uploaded}</div></div>
    <div class="stat"><div class="label">Readiness</div><div class="val" style="color:${pct>70?'var(--green)':pct>40?'var(--yellow)':'var(--red)'}">${pct}%</div><div class="gauge"><div class="fill" style="width:${pct}%;background:${pct>70?'var(--green)':pct>40?'var(--yellow)':'var(--red)'}"></div></div></div>
  </div>
  ${Object.entries(groups).map(([key,label])=>{
    const docs=key==='all'?vault:vault.filter(v=>v.required_for===key);
    if(!docs.length)return'';
    return`<div class="card"><div class="card-header"><h3>${label} (${docs.filter(d=>d.status==='uploaded').length}/${docs.length})</h3></div><div class="card-body">
      ${docs.map(v=>`<div class="doc-row"><div class="doc-icon ${v.status==='uploaded'?'uploaded':'missing'}">${v.status==='uploaded'?'✅':'📄'}</div><div class="doc-info"><div class="name">${esc(v.doc_name)}</div><div class="desc">${esc(v.description)}</div></div><div class="doc-actions">${v.status==='uploaded'?`<span class="check-icon">✓</span> <span style="font-size:11px;color:var(--text3)">${v.uploaded_at?new Date(v.uploaded_at).toLocaleDateString():'Uploaded'}</span>`:`<button class="upload-btn" onclick="uploadDoc('${v.id}','${esc(v.org_id)}','${esc(v.doc_type)}')">Upload</button>`}</div></div>`).join('')}
    </div></div>`;
  }).join('')}`;
}

function rPackages(){
  const pkgs=(D.packages||[]).filter(p=>orgFilter==='all'||p.org_id===orgFilter);
  if(!pkgs.length)return'<div class="card"><div class="card-header"><h3>Application Packages</h3></div><div class="card-body"><div style="padding:40px;text-align:center;color:var(--text3)">No packages yet. Click "Apply" on a grant to start one.</div></div></div>';
  return `<div class="card"><div class="card-header"><h3>Application Packages (${pkgs.length})</h3></div><div class="card-body"><table><thead><tr><th>Grant</th><th>Org</th><th>Status</th><th>Docs</th><th>Created</th></tr></thead><tbody>
    ${pkgs.map(p=>`<tr><td><strong>${esc(p.grant_name||'')}</strong><br><span style="font-size:11px;color:var(--text3)">${esc(p.funder||'')}</span></td><td>${orgName(p.org_id)}</td><td><span class="pill ${pillCls(p.status)}">${p.status}</span></td><td>${(p.documents_attached||[]).length} attached / ${(p.documents_missing||[]).length} missing</td><td>${p.created_at?new Date(p.created_at).toLocaleDateString():''}</td></tr>`).join('')}
  </tbody></table></div></div>`;
}

function rBudgets(){
  const budgets=(D.budgets||[]).filter(b=>orgFilter==='all'||b.org_id===orgFilter);
  if(!budgets.length)return'<div class="card"><div class="card-header"><h3>Budget Templates</h3></div><div class="card-body"><div style="padding:40px;text-align:center;color:var(--text3)">No budgets generated yet. Use /budget in Telegram or click Apply on a grant.</div></div></div>';
  return `<div class="card"><div class="card-header"><h3>Budget Templates (${budgets.length})</h3></div><div class="card-body"><table><thead><tr><th>Grant</th><th>Total</th><th>Status</th><th>Created</th></tr></thead><tbody>
    ${budgets.map(b=>`<tr><td>${esc(b.grant_name||'Budget')}</td><td>$${(b.total_amount||0).toLocaleString()}</td><td><span class="pill ${pillCls(b.status)}">${b.status}</span></td><td>${b.created_at?new Date(b.created_at).toLocaleDateString():''}</td></tr>`).join('')}
  </tbody></table></div></div>`;
}

function rReadiness(){
  const vault=fv();
  const uploaded=vault.filter(v=>v.status==='uploaded').length;
  const total=vault.length;
  const pct=total?Math.round(uploaded/total*100):0;
  const grants=fg();
  const fedDocs=vault.filter(v=>v.required_for==='federal');
  const fedReady=fedDocs.filter(v=>v.status==='uploaded').length;
  const foundDocs=vault.filter(v=>v.required_for==='foundation');
  const foundReady=foundDocs.filter(v=>v.status==='uploaded').length;
  const allDocs=vault.filter(v=>v.required_for==='all');
  const allReady=allDocs.filter(v=>v.status==='uploaded').length;

  return `<div class="stats" style="grid-template-columns:repeat(4,1fr)">
    <div class="stat"><div class="label">Overall Readiness</div><div class="val" style="color:${pct>70?'var(--green)':pct>40?'var(--yellow)':'var(--red)'};font-size:32px">${pct}%</div><div class="gauge"><div class="fill" style="width:${pct}%;background:${pct>70?'var(--green)':pct>40?'var(--yellow)':'var(--red)'}"></div></div></div>
    <div class="stat"><div class="label">Universal Docs</div><div class="val">${allReady}/${allDocs.length}</div><div class="sub">Required for all grants</div></div>
    <div class="stat"><div class="label">Federal Ready</div><div class="val">${fedReady}/${fedDocs.length}</div><div class="sub">HRSA, VA, SBA</div></div>
    <div class="stat"><div class="label">Foundation Ready</div><div class="val">${foundReady}/${foundDocs.length}</div><div class="sub">RWJ, United Way</div></div>
  </div>
  <div class="card"><div class="card-header"><h3>Action Items — What You Need to Upload</h3></div><div class="card-body">
    ${vault.filter(v=>v.status==='missing').map(v=>`<div class="doc-row"><div class="doc-icon missing">⚠️</div><div class="doc-info"><div class="name">${esc(v.doc_name)}</div><div class="desc">${esc(v.description)} — <strong>Required for: ${v.required_for}</strong></div></div><div class="doc-actions"><button class="upload-btn" onclick="uploadDoc('${v.id}','${esc(v.org_id)}','${esc(v.doc_type)}')">Upload Now</button></div></div>`).join('')||'<div style="padding:20px;text-align:center;color:var(--green);font-weight:600">🎉 All documents uploaded! You are grant-ready.</div>'}
  </div></div>
  <div class="card"><div class="card-header"><h3>Grant Matching — ${grants.length} Opportunities</h3></div><div class="card-body"><table><thead><tr><th>Grant</th><th>Match</th><th>Can Apply?</th></tr></thead><tbody>
    ${grants.sort((a,b)=>(b.match_score||0)-(a.match_score||0)).slice(0,8).map(g=>{
      const canApply=pct>=50;
      return`<tr><td>${esc(g.name)}</td><td><span class="score ${scoreCls(g.match_score)}"><span class="bar"><span class="fill" style="width:${g.match_score||0}%"></span></span>${g.match_score||0}%</span></td><td>${canApply?'<span class="pill pill-ready">Ready</span>':'<span class="pill pill-missing">Docs Needed</span>'}</td></tr>`;
    }).join('')}
  </tbody></table></div></div>`;
}

function rHistory(){
  const runs=(D.runs||[]).filter(r=>orgFilter==='all'||r.org_id===orgFilter);
  if(!runs.length)return'<div class="card"><div class="card-header"><h3>Run History</h3></div><div class="card-body"><div style="padding:40px;text-align:center;color:var(--text3)">No runs yet.</div></div></div>';
  return `<div class="card"><div class="card-header"><h3>Run History (${runs.length})</h3></div><div class="card-body"><table><thead><tr><th>Date</th><th>Org</th><th>Grants</th><th>Status</th></tr></thead><tbody>
    ${runs.map(r=>`<tr><td>${r.run_date?new Date(r.run_date).toLocaleString():''}</td><td>${orgName(r.org_id)}</td><td>${r.grants_found||0}</td><td><span class="pill ${pillCls(r.status)}">${r.status}</span></td></tr>`).join('')}
  </tbody></table></div></div>`;
}

// ── ACTIONS ──
function setPage(p){page=p;document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.page===p));render()}
function setOrg(o){orgFilter=o;document.querySelectorAll('.org-btn').forEach(b=>b.classList.toggle('active',b.textContent.includes(o==='all'?'All':o==='holigenix_healthcare'?'Holigenix':'K1')));render()}
function toggleDetail(id){document.getElementById(id)?.classList.toggle('show')}

let pendingUpload=null;
function uploadDoc(docId,orgId,docType){
  pendingUpload={docId,orgId,docType};
  document.getElementById('fileInput').click();
}
document.getElementById('fileInput').addEventListener('change',async function(e){
  if(!e.target.files.length||!pendingUpload)return;
  const file=e.target.files[0];
  const{docId,orgId,docType}=pendingUpload;
  const path=`${orgId}/${docType}_${Date.now()}_${file.name}`;

  // Upload to Supabase Storage
  const uploadRes=await fetch(`${SB_URL}/storage/v1/object/grant-documents/${path}`,{
    method:'POST',
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':file.type},
    body:file
  });

  if(uploadRes.ok){
    const fileUrl=`${SB_URL}/storage/v1/object/public/grant-documents/${path}`;
    await sbPatch('document_vault',`id=eq.${docId}`,{status:'uploaded',file_url:fileUrl,uploaded_at:new Date().toISOString()});
    alert('✅ Document uploaded successfully!');
    await load();
  }else{
    alert('❌ Upload failed. Try again.');
  }
  e.target.value='';
  pendingUpload=null;
});

async function runSearch(){
  if(!confirm('Run a new grant search? This may take 2-3 minutes.'))return;
  try{await fetch(`${API}/api/run`,{method:'POST',headers:{'Content-Type':'application/json'}});alert('🔍 Grant search started! Results will appear in 2-3 minutes.');}catch(e){alert('Error: '+e.message)}
}

async function applyGrant(grantName,orgId){
  if(!confirm(`🚀 Apply for "${grantName}"?\n\nThe Applicator agent will:\n1. Check document vault readiness\n2. Generate tailored narrative\n3. Create detailed budget\n4. Fill SF-424 data\n5. Package the full application\n\nThis takes 2-3 minutes.`))return;
  try{
    const r=await fetch(`${API}/api/apply`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({grantName,orgId})});
    const d=await r.json();
    if(d.status==='started'){
      showToast('🚀 Applicator started! Building application package for "'+grantName+'"...');
      setTimeout(()=>showToast('⏳ Still working... narrative + budget + docs being assembled.'),30000);
      setTimeout(()=>{showToast('📦 Check Application Packages page for results.');load();},120000);
    }else{alert('Error: '+(d.error||'Unknown'));}
  }catch(e){alert('Error: '+e.message);}
}

async function runSearch(){
  const orgId=orgFilter==='all'?'holigenix_healthcare':orgFilter;
  if(!confirm('Run a new grant search for '+orgName(orgId)+'?'))return;
  try{
    await fetch(`${API}/api/search`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({orgId})});
    showToast('🔍 Grant search started for '+orgName(orgId)+'! Results in 2-3 minutes.');
    setTimeout(load,120000);
  }catch(e){alert('Error: '+e.message);}
}

function showToast(msg){
  let t=document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';t.style.cssText='position:fixed;bottom:20px;right:20px;background:var(--surface);border:1px solid var(--accent);border-radius:10px;padding:12px 20px;font-size:13px;color:var(--text);box-shadow:var(--shadow);z-index:999;max-width:400px;transition:opacity .3s';document.body.appendChild(t);}
  t.textContent=msg;t.style.opacity='1';
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>{t.style.opacity='0'},8000);
}

// ── NAV ──
document.querySelectorAll('.nav-item[data-page]').forEach(n=>n.addEventListener('click',()=>setPage(n.dataset.page)));

// ── INIT ──
load();
setInterval(load,60000);
</script>
</body>
